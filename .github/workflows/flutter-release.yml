name: Flutter Android Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Git tag to create or update, for example v1.0.0'
        required: true
        type: string
      release_name:
        description: 'Optional GitHub release title'
        required: false
        default: ''
        type: string
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    env:
      JAVA_VERSION: '17'
      FLUTTER_VERSION: '3.41.7'
      API_BASE_URL: ${{ vars.FLUTTER_API_BASE_URL || 'https://tripcircle-e4ko.onrender.com' }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      RELEASE_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_name || github.ref_name }}
      PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag exists for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        working-directory: .
        run: |
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists."
          else
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Restore Flutter packages
        run: flutter pub get

      - name: Verify signing secrets
        shell: bash
        run: |
          test -n "${{ secrets.FLUTTER_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.FLUTTER_KEYSTORE_PASSWORD }}"
          test -n "${{ secrets.FLUTTER_KEY_ALIAS }}"
          test -n "${{ secrets.FLUTTER_KEY_PASSWORD }}"

      - name: Create Android signing files
        shell: bash
        run: |
          echo "${{ secrets.FLUTTER_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.FLUTTER_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.FLUTTER_KEY_PASSWORD }}
          keyAlias=${{ secrets.FLUTTER_KEY_ALIAS }}
          storeFile=release-keystore.jks
          EOF

      - name: Analyze Flutter app
        run: flutter analyze lib

      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=${API_BASE_URL}

      - name: Build release app bundle
        run: flutter build appbundle --release --dart-define=API_BASE_URL=${API_BASE_URL}

      - name: Rename Android outputs
        shell: bash
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/tripcircle-${RELEASE_TAG}.apk
          cp build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/tripcircle-${RELEASE_TAG}.aab

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tripcircle-android-${{ env.RELEASE_TAG }}
          path: |
            apps/mobile/build/app/outputs/flutter-apk/tripcircle-${{ env.RELEASE_TAG }}.apk
            apps/mobile/build/app/outputs/bundle/release/tripcircle-${{ env.RELEASE_TAG }}.aab

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.PRERELEASE == 'true' }}
          generate_release_notes: true
          files: |
            apps/mobile/build/app/outputs/flutter-apk/tripcircle-${{ env.RELEASE_TAG }}.apk
            apps/mobile/build/app/outputs/bundle/release/tripcircle-${{ env.RELEASE_TAG }}.aab
